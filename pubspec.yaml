name: qris_health
description: "Qris health app"
publish_to: 'none'

version: 1.8.0+13

environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.1
  http: ^1.2.2
  get: ^4.6.6
  flutter_svg: ^2.0.16
  freezed_annotation: ^2.4.4
  lottie: ^3.1.3
  flutter_bloc: ^8.1.6
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  modal_progress_hud_nsn: ^0.5.1
  pin_code_fields: ^8.0.1
  dotted_border: ^2.0.0+3
  flutter_carousel_widget: ^3.1.0
  dotted_line: ^3.2.3
  fancy_search_dropdown: ^0.0.1
  fade_shimmer: ^2.2.0
  flutter_html:
  equatable: ^2.0.5
  cached_network_image: ^3.4.1
  persistent_bottom_nav_bar: ^6.2.1
  razorpay_flutter: ^1.4.0
  share_plus: ^11.0.0
  flutter_phone_direct_caller: ^2.2.1
  firebase_core: ^3.15.1
  firebase_messaging: ^15.2.9
  


  flutter_udid: ^4.0.0
  permission_handler: ^12.0.1
  flutter_local_notifications: ^19.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.10
  firebase_database: ^11.1.4
  package_info_plus: ^8.1.0
  facebook_app_events: ^0.20.0

  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  freezed: ^2.5.7
  build_runner: ^2.4.10
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logos/
    - assets/images/illustrations/
    - assets/images/icons/
    - assets/images/icons/gender/
    - assets/images/icons/home_screen_icons/
    - assets/images/icons/drawer_icons/
    - assets/images/icons/test_categories_icon/
    - assets/images/icons/accreditations/
    - assets/images/placeholders/
    - assets/images/icons/popular_packages_type/
    - assets/images/icons/test_benefit_icons/
    - assets/images/icons/health_score_icons/
    - assets/images/icons/health_problem_icons/
    - assets/images/icons/package_icons/
    - assets/images/icons/mental_wellness_icons/
    - assets/images/icons/all_scan_icon/
    - assets/images/icons/why_choose_us_icons/
    - assets/images/icons/how_to_book_icons/
    - assets/images/illustrations/subscan_illustrations/
    - assets/images/icons/doctor_specialist_type_icons/
    - assets/images/icons/social_media_icons/
    - assets/images/icons/nav_bar_icons/
    - assets/images/icons/included_packages_icon/
    - assets/images/icons/order_status_icons/
    - assets/images/jsons/
    - assets/images/icons/extension_icons/
    - assets/images/icons/ai_health_report_analysis/
  

  fonts:
    - family: Ubuntu
      fonts:
        - asset: assets/fonts/ubuntu/Ubuntu-Regular.ttf
          weight: 400
        - asset: assets/fonts/ubuntu/Ubuntu-Medium.ttf
          weight: 500
        - asset: assets/fonts/ubuntu/Ubuntu-Medium.ttf
          weight: 600
        - asset: assets/fonts/ubuntu/Ubuntu-Bold.ttf
          weight: 700

    - family: Lato
      fonts:
        - asset: assets/fonts/lato/Lato-Light.ttf
          weight: 300
        - asset: assets/fonts/lato/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 500
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 600
        - asset: assets/fonts/lato/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/lato/Lato-Black.ttf
          weight: 800
        - asset: assets/fonts/lato/Lato-Black.ttf
          weight: 900

    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis/Metropolis-Regular.ttf
          weight: 400
        - asset: assets/fonts/metropolis/Metropolis-Medium.ttf
          weight: 500
        - asset: assets/fonts/metropolis/Metropolis-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/metropolis/Metropolis-Bold.ttf
          weight: 700
        - asset: assets/fonts/metropolis/Metropolis-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/metropolis/Metropolis-Black.ttf
          weight: 900